<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBEATHON Round 2 - Link Management Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-secondary: #0ea5e9;
            --success: #10b981;
            --error: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.12), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.12), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 14px 0 rgba(14, 165, 233, 0.39);
        }

        .primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.23);
            filter: brightness(110%);
        }

        .primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
            background: rgba(0, 0, 0, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.4);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-label {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .table-header {
            display: grid;
            grid-template-columns: 2fr 1fr 200px 100px 120px;
            gap: 1.5rem;
            padding: 1rem 1.5rem;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        .link-row {
            display: grid;
            grid-template-columns: 2fr 1fr 200px 100px 120px;
            gap: 1.5rem;
            align-items: start;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .link-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .link-row:last-child {
            border-bottom: none;
        }

        .url-cell {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .url-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        a {
            color: var(--accent-primary);
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: #818cf8;
            text-decoration: underline;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .active {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .inactive {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .expired {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .meta-cell {
            color: var(--text-muted);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .copy-icon-btn {
            background: none;
            border: none;
            padding: 0.25rem;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-icon-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .action-btns button {
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        @media (max-width: 1024px) {
            .table-header {
                display: none;
            }

            .link-row {
                grid-template-columns: 1fr;
                gap: 1rem;
                border: 1px solid var(--border);
                border-radius: 12px;
                margin-bottom: 1rem;
            }

            .link-row>div {
                display: flex;
                flex-direction: column;
                gap: 0.25rem;
            }

            .action-btns {
                flex-direction: row;
            }
        }
    </style>
</head>

<body>
    <div class="app" id="app">
        <!-- Loading -->
        <div id="loading" style="text-align: center; padding: 4rem;">
            <div style="font-size: 1.5rem; margin-bottom: 1rem;">🔗 Link Management Platform</div>
            <div>Loading...</div>
        </div>

        <!-- Auth screens -->
        <div id="auth-screen" style="display: none;">
            <div class="header">
                <div class="logo">🔗 LinkHub</div>
            </div>
            <div class="card" style="max-width: 400px; margin: 0 auto;">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Welcome</h1>
                    <p style="color: #94a3b8;">Manage your short links</p>
                </div>
                <div id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="user@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="••••••••">
                    </div>
                    <button class="primary" style="width: 100%;" onclick="signIn()">Sign In</button>
                    <div style="text-align: center; margin-top: 1rem;">
                        <button class="secondary" onclick="signUp()" style="width: 100%; margin-bottom: 0.5rem;">Create
                            Account</button>
                        <a href="#" onclick="showForgotPassword()" style="color: #38bdf8; font-size: 0.9rem;">Forgot
                            password?</a>
                    </div>
                </div>
                <div id="signup-form" style="display: none;">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signup-email" placeholder="user@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" placeholder="••••••••">
                    </div>
                    <button class="primary" style="width: 100%;" onclick="signUpConfirm()">Create Account</button>
                    <button class="secondary" onclick="showLogin()" style="width: 100%; margin-top: 0.5rem;">Back to
                        Sign In</button>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" style="display: none;">
            <div class="header">
                <div class="logo">🔗 LinkHub</div>
                <div class="auth-btns">
                    <span id="user-email" style="color: #94a3b8;"></span>
                    <button class="secondary" onclick="signOut()">Logout</button>
                </div>
            </div>

            <!-- Create link form -->
            <div class="card">
                <h2 style="margin-bottom: 1.5rem;">Create New Link</h2>
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Destination URL</label>
                        <input type="url" id="dest-url" placeholder="https://example.com">
                    </div>
                    <div class="form-group">
                        <label>Max Clicks (optional)</label>
                        <input type="number" id="max-clicks" placeholder="Unlimited" min="1">
                    </div>
                    <div style="padding-top: 2.25rem;">
                        <button class="primary" onclick="createLink()" style="width: 100%; height: 100%;">Create Short
                            Link</button>
                    </div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="total-links">0</div>
                    <div class="stat-label">Total Links</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-clicks">0</div>
                    <div class="stat-label">Total Clicks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="active-links">0</div>
                    <div class="stat-label">Active Links</div>
                </div>
            </div>

            <!-- Links table -->
            <div class="card" style="padding: 0; overflow: hidden;">
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 1.5rem;">
                    <h2>My Links</h2>
                    <button class="secondary" onclick="refreshLinks()">Refresh Data</button>
                </div>
                <div class="table-header">
                    <div>Original Destination</div>
                    <div>Short URLs</div>
                    <div>Clicks</div>
                    <div>Status</div>
                    <div>Actions</div>
                </div>
                <div id="links-container">
                    <div style="text-align: center; padding: 3rem; color: var(--text-muted);">No links yet. Create your
                        first short link above!
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick SVG icons included directly -->
    <svg style="display: none;">
        <symbol id="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </symbol>
    </svg>

    <script>
        // Supabase config (free tier)
        const SUPABASE_URL = 'https://ztfwuxmjsaogqywmwlfw.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_EKwsb8YUiZw5zBIFYj0YHA_8JIRAgQf';
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let links = [];

        // Auth
        async function signIn() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const { data, error } = await client.auth.signInWithPassword({ email, password });
            if (error) return showError(error.message);
            currentUser = data.user;
            showDashboard();
        }

        async function signUp() {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            const { data, error } = await client.auth.signUp({ email, password });
            if (error) return showError(error.message);
            showMessage('Check email for confirmation!');
        }

        async function signUpConfirm() {
            await signUp();
            showLogin();
        }

        async function signOut() {
            await client.auth.signOut();
            showAuth();
        }

        // UI
        function showAuth() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('user-email').textContent = currentUser.email;
            refreshLinks();
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg') || createErrorDiv();
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }

        function createErrorDiv() {
            const div = document.createElement('div');
            div.id = 'errorMsg';
            div.style.cssText = 'position: fixed; top: 20px; right: 20px; padding: 1rem 1.5rem; background: #ef4444; color: white; border-radius: 8px; z-index: 1000;';
            document.body.appendChild(div);
            return div;
        }

        // Links CRUD
        async function createLink() {
            const originalUrl = document.getElementById('dest-url').value.trim();
            const maxClicks = parseInt(document.getElementById('max-clicks').value) || null;

            if (!originalUrl || !isValidUrl(originalUrl)) return showError('Valid URL required');

            const id = 'lnk_' + Math.random().toString(36).substr(2, 8);
            const shortUrl = `${window.location.origin}/#/${id}`;
            const createdAt = new Date().toISOString();

            document.querySelector('#dashboard .primary').textContent = 'Generating...';
            document.querySelector('#dashboard .primary').disabled = true;

            let apiUrlStr = "";
            try {
                // Fetch external short URL
                try {
                    const response = await fetch(`https://is.gd/create.php?format=simple&url=${encodeURIComponent(originalUrl)}`);
                    if (!response.ok) throw new Error("Failed to shorten via API.");
                    apiUrlStr = await response.text();
                } catch (err) {
                    const fallbackResponse = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(originalUrl)}`);
                    if (!fallbackResponse.ok) throw new Error("Failed to shorten via Fallback API.");
                    apiUrlStr = await fallbackResponse.text();
                }

                if (!apiUrlStr.startsWith("http")) apiUrlStr = "https://" + apiUrlStr;

            } catch (err) {
                showError("Failed to generate external API link, using local only.");
                apiUrlStr = shortUrl;
            }

            document.querySelector('#dashboard .primary').textContent = 'Create Short Link';
            document.querySelector('#dashboard .primary').disabled = false;


            const { error } = await client
                .from('links')
                .insert([{
                    id, original_url: originalUrl, short_url: apiUrlStr,
                    max_clicks: maxClicks, current_clicks: 0, is_active: true,
                    created_at: createdAt, last_accessed: null, user_id: currentUser.id
                }]);

            if (error) return showError(error.message);

            document.getElementById('dest-url').value = '';
            document.getElementById('max-clicks').value = '';
            refreshLinks();
            showMessage('Link created!');
        }

        async function refreshLinks() {
            const { data, error } = await client
                .from('links')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (error) return showError(error.message);
            links = data || [];
            renderLinks();
            updateStats();
        }

        function renderLinks() {
            const container = document.getElementById('links-container');

            container.innerHTML = links.map(link => {
                const isExpired = link.max_clicks && link.current_clicks >= link.max_clicks;
                const activeStatus = link.is_active && !isExpired ? 'active' : (!link.is_active ? 'inactive' : 'expired');
                const activeText = link.is_active && !isExpired ? 'Active' : (!link.is_active ? 'Disabled' : 'Expired');
                const shortIdUrl = `${window.location.origin}/#/${link.id}`;

                return `
        <div class="link-row">
          <div class="url-cell" style="word-break: break-all; padding-right: 1rem;">
             <a href="${link.original_url}" target="_blank" style="font-weight: 500;">${link.original_url.length > 50 ? link.original_url.slice(0, 50) + '...' : link.original_url}</a>
             <div class="meta-cell">
                <span>Created: ${new Date(link.created_at).toLocaleDateString()}</span>
             </div>
          </div>
          
          <div class="url-cell">
            <div class="url-group">
                <a href="${link.short_url}" target="_blank" style="font-size: 0.85rem; color: #34d399; flex-grow: 1; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">${link.short_url.replace(/^https?:\/\//, '')} (API)</a>
                <button class="copy-icon-btn" onclick="copyShortUrl('${link.short_url}')" title="Copy API Link">
                    <svg width="14" height="14"><use href="#icon-copy"></use></svg>
                </button>
            </div>
            <div class="url-group">
                <a href="${shortIdUrl}" target="_blank" style="font-size: 0.85rem; color: var(--text-muted); flex-grow: 1; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">/${link.id} (Local)</a>
                <button class="copy-icon-btn" onclick="copyShortUrl('${shortIdUrl}')" title="Copy Local Link">
                    <svg width="14" height="14"><use href="#icon-copy"></use></svg>
                </button>
            </div>
          </div>
          
          <div class="meta-cell">
            <div style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">${link.current_clicks || 0} <span style="font-weight: 400; color: var(--text-muted); font-size: 0.85rem;">/ ${link.max_clicks || '∞'}</span></div>
            <span style="font-size: 0.75rem;">Last: ${link.last_accessed ? new Date(link.last_accessed).toLocaleDateString() : 'Never'}</span>
          </div>
          
          <div>
            <span class="status-badge ${activeStatus}">
                <span style="display:inline-block; width:6px; height:6px; border-radius:50%; background:currentColor; margin-right:6px;"></span>
                ${activeText}
            </span>
          </div>
          
          <div class="action-btns">
            <button class="secondary" onclick="toggleLink('${link.id}', ${link.is_active})">${link.is_active ? 'Disable' : 'Enable'}</button>
            <button class="secondary" onclick="editLink('${link.id}')">Edit URL</button>
          </div>
        </div>
      `;
            }).join('');
        }

        async function toggleLink(id, currentActiveState) {
            const { error } = await client
                .from('links')
                .update({ is_active: !currentActiveState })
                .eq('id', id);

            if (!error) refreshLinks();
        }

        async function editLink(id) {
            const link = links.find(l => l.id === id);
            const newUrl = prompt('New destination URL:', link.original_url);
            if (newUrl && isValidUrl(newUrl)) {
                const { error } = await client
                    .from('links')
                    .update({ original_url: newUrl })
                    .eq('id', id)
                    .eq('user_id', currentUser.id);
                if (!error) refreshLinks();
            }
        }

        function copyShortUrl(url) {
            navigator.clipboard.writeText(url);
            showMessage('Short URL copied!');
        }

        function updateStats() {
            document.getElementById('total-links').textContent = links.length;
            document.getElementById('total-clicks').textContent = links.reduce((sum, l) => sum + l.current_clicks, 0);
            document.getElementById('active-links').textContent = links.filter(l => l.is_active && (!l.max_clicks || l.current_clicks < l.max_clicks)).length;
        }

        function showMessage(msg) {
            const msgDiv = createErrorDiv();
            msgDiv.id = 'msgDiv';
            msgDiv.textContent = msg;
            msgDiv.style.background = '#10b981';
            setTimeout(() => msgDiv.remove(), 3000);
        }

        function isValidUrl(string) {
            try { new URL(string); return true; } catch { return false; }
        }

        // Hash routing for anonymous short link redirects
        async function handleRoute() {
            const hashId = window.location.hash.slice(1);
            if (!hashId) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';

            try {
                const { data: link, error } = await client
                    .from('links')
                    .select('*')
                    .eq('id', hashId)
                    .single();

                if (error || !link || !link.is_active || (link.max_clicks && link.current_clicks >= link.max_clicks)) {
                    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;"><div class="card" style="text-align:center;padding:3rem;"><h1 style="color:#ef4444;margin-bottom:1rem;">🔒 Link Inactive or Expired</h1><p style="color:#94a3b8;margin-bottom:1.5rem;">This destination is no longer available.</p><a href="/" style="color:#38bdf8;">Go to LinkHub Platform</a></div></div>';
                    return;
                }

                // Update click immediately
                const newClicks = (link.current_clicks || 0) + 1;
                await client
                    .from('links')
                    .update({ current_clicks: newClicks, last_accessed: new Date().toISOString() })
                    .eq('id', link.id);

                window.location.href = link.original_url;
            } catch (err) {
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;"><div class="card" style="text-align:center;padding:3rem;"><h1 style="color:#ef4444;margin-bottom:1rem;">⚠️ Configuration Error</h1><p style="color:#94a3b8;margin-bottom:1.5rem;">Supabase is not configured yet.</p><a href="/" style="color:#38bdf8;">Go to LinkHub Platform</a></div></div>';
            }
        }

        window.addEventListener('hashchange', handleRoute);

        // Initial load logic
        const isRedirectRoute = !!window.location.hash;

        if (isRedirectRoute) {
            handleRoute();
        } else {
            client.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    currentUser = session.user;
                    showDashboard();
                } else {
                    showAuth();
                }
            });

            client.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_IN') {
                    currentUser = session.user;
                    showDashboard();
                } else if (event === 'SIGNED_OUT') {
                    showAuth();
                }
            });
        }
    </script>
</body>

</html>
